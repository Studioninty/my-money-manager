<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Manager Dashboard</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.11/firebase-firestore.js"></script>
</head>
<body class="bg-gray-900 text-white">

  <!-- Sidebar -->
  <div class="flex h-screen">
    <aside class="w-64 bg-gray-800 hidden md:block">
      <div class="p-4 text-xl font-bold">Money Manager</div>
      <nav class="mt-4">
        <a href="#" class="block px-4 py-2 hover:bg-gray-700">Dashboard</a>
        <a href="#" class="block px-4 py-2 hover:bg-gray-700">Transactions</a>
        <a href="#" class="block px-4 py-2 hover:bg-gray-700">Analytics</a>
        <a href="#" class="block px-4 py-2 hover:bg-gray-700">Admin Panel</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-y-auto">
      <!-- Auth Section -->
      <div id="auth-section" class="max-w-md mx-auto bg-gray-800 p-6 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-4">Login / Signup</h2>
        <input id="email" type="email" placeholder="Email" class="w-full mb-2 p-2 rounded bg-gray-700 text-white" />
        <input id="password" type="password" placeholder="Password" class="w-full mb-2 p-2 rounded bg-gray-700 text-white" />
        <button id="loginBtn" class="w-full bg-blue-600 py-2 rounded mb-2">Login</button>
        <button id="signupBtn" class="w-full bg-green-600 py-2 rounded mb-2">Signup</button>
        <button id="googleBtn" class="w-full bg-red-600 py-2 rounded">Login with Google</button>
      </div>

      <!-- Dashboard Section -->
      <div id="dashboard" class="hidden">
        <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <!-- Cards -->
          <div class="bg-gray-800 p-4 rounded-lg shadow">
            <h2 class="text-xl font-bold">Total Income</h2>
            <p id="totalIncome" class="text-2xl mt-2">0</p>
          </div>
          <div class="bg-gray-800 p-4 rounded-lg shadow">
            <h2 class="text-xl font-bold">Total Expenses</h2>
            <p id="totalExpenses" class="text-2xl mt-2">0</p>
          </div>
          <div class="bg-gray-800 p-4 rounded-lg shadow">
            <h2 class="text-xl font-bold">Bank Transfers</h2>
            <p id="totalTransfers" class="text-2xl mt-2">0</p>
          </div>
        </div>

        <!-- Transactions Table -->
        <div class="mt-6 bg-gray-800 p-4 rounded-lg shadow">
          <h2 class="text-xl font-bold mb-4">Transactions</h2>
          <table class="w-full text-left">
            <thead>
              <tr>
                <th class="p-2">Date</th>
                <th class="p-2">Type</th>
                <th class="p-2">Amount</th>
                <th class="p-2">Bank</th>
                <th class="p-2">Actions</th>
              </tr>
            </thead>
            <tbody id="transactionsTable"></tbody>
          </table>
        </div>

        <!-- Chart -->
        <div class="mt-6 bg-gray-800 p-4 rounded-lg shadow">
          <h2 class="text-xl font-bold mb-4">Analytics</h2>
          <canvas id="transactionsChart"></canvas>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden mt-6 bg-gray-800 p-4 rounded-lg shadow">
          <h2 class="text-xl font-bold mb-4">Admin Panel</h2>
          <div id="usersList"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-gray-800 p-6 rounded-lg w-96">
      <h2 class="text-xl font-bold mb-4">Edit Transaction</h2>
      <input id="editAmount" type="number" class="w-full mb-2 p-2 rounded bg-gray-700 text-white" />
      <input id="editBank" type="text" class="w-full mb-2 p-2 rounded bg-gray-700 text-white" />
      <select id="editType" class="w-full mb-2 p-2 rounded bg-gray-700 text-white">
        <option value="income">Income</option>
        <option value="expense">Expense</option>
        <option value="transfer">Transfer</option>
      </select>
      <button id="saveEditBtn" class="w-full bg-blue-600 py-2 rounded">Save</button>
      <button id="closeEditBtn" class="w-full bg-gray-600 py-2 rounded mt-2">Cancel</button>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDRErh8H98za0QzYBziRMVfm5dMfAa9MDA",
      authDomain: "my-money-manager-1dacb.firebaseapp.com",
      projectId: "my-money-manager-1dacb",
      storageBucket: "my-money-manager-1dacb.firebasestorage.app",
      messagingSenderId: "472698368140",
      appId: "1:472698368140:web:8efd3e38778610099d4ba9"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const adminEmail = "saqib77000@gmail.com";

    // Auth Elements
    const authSection = document.getElementById("auth-section");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");
    const signupBtn = document.getElementById("signupBtn");
    const googleBtn = document.getElementById("googleBtn");

    loginBtn.onclick = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password);
    };

    signupBtn.onclick = () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password);
    };

    googleBtn.onclick = () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider);
    };

    auth.onAuthStateChanged(user => {
      if (user) {
        authSection.classList.add("hidden");
        dashboard.classList.remove("hidden");
        loadTransactions(user);
        if (user.email === adminEmail) {
          document.getElementById("adminPanel").classList.remove("hidden");
          loadAllUsers();
        }
      } else {
        authSection.classList.remove("hidden");
        dashboard.classList.add("hidden");
      }
    });

    // Load Transactions
    function loadTransactions(user) {
      db.collection("users").doc(user.uid).collection("transactions").onSnapshot(snapshot => {
        const table = document.getElementById("transactionsTable");
        table.innerHTML = "";
        let income = 0, expenses = 0, transfers = 0;
        snapshot.forEach(doc => {
          const t = doc.data();
          if (t.type === "income") income += t.amount;
          if (t.type === "expense") expenses += t.amount;
          if (t.type === "transfer") transfers += t.amount;
          const row = document.createElement("tr");
          row.innerHTML = `
            <td class="p-2">${t.date}</td>
            <td class="p-2">${t.type}</td>
            <td class="p-2">${t.amount}</
