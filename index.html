<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Money Manager | SaaS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f111a; --card: #161b2b; --primary: #ff5733; --green: #10b981; 
    --red: #ef4444; --text: #e2e8f0; --border: #1e2535; --glass: rgba(255, 255, 255, 0.03);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Auth & Splash */
.splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.auth-card { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); width: 350px; text-align: center; }
.auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #0f1117; border: 1px solid var(--border); border-radius: 8px; color: #fff; }

/* Header & Nav */
.topbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: var(--glass); border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); }
.logo { font-size: 22px; font-weight: 700; color: var(--text); }
.logo span { color: var(--primary); }
.user-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.user-info img { width: 32px; border-radius: 50%; border: 2px solid var(--primary); }

/* Layout Grid */
.app-content { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.metric-card { background: var(--card); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); position: relative; }
.metric-card .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.metric-card .val { font-size: 26px; font-weight: 700; margin-top: 5px; }

/* Action Buttons */
.btn-row { display: flex; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
.abtn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
.abtn.primary { background: var(--primary); color: #fff; }
.abtn.outline { background: transparent; border: 1px solid var(--border); color: #94a3b8; }

/* Transactions Table */
.data-table { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 1rem; overflow-x: auto; }
.row { display: grid; grid-template-columns: 80px 1fr 100px 100px 120px 80px; padding: 12px; border-bottom: 1px solid var(--border); align-items: center; font-size: 13px; }
.row.header { color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; }
.action-icons { display: flex; gap: 10px; justify-content: flex-end; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 16px; filter: grayscale(1); }
.icon-btn:hover { filter: grayscale(0); transform: scale(1.1); }

/* Modals */
.modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; align-items: center; justify-content: center; padding: 1rem; }
.modal { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 450px; }
.fg { margin-bottom: 15px; }
.fg label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
.fg input, .fg select { width: 100%; padding: 12px; background: #0f1117; border: 1px solid var(--border); border-radius: 8px; color: #fff; }

/* Responsive */
@media (max-width: 768px) {
    .row { grid-template-columns: 80px 1fr 80px 60px; }
    .hide-mobile { display: none; }
}
</style>
</head>
<body>

<div id="splash" class="splash">
    <div class="auth-card" id="auth-ui">
        <h2 style="margin-bottom:20px">My <span>Money</span> Manager</h2>
        <div id="login-form">
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="pw" class="auth-input" placeholder="Password">
            <button class="abtn primary" style="width:100%; margin-top:10px" onclick="emailLogin()">Login / Sign Up</button>
            <div style="margin: 15px 0; color:#64748b">OR</div>
            <button class="abtn outline" style="width:100%" onclick="googleLogin()">Continue with Google</button>
        </div>
    </div>
</div>

<div id="app" style="display:none">
    <header class="topbar">
        <div class="logo">Money <span>Manager</span></div>
        <div class="user-info" id="user-header"></div>
    </header>

    <main class="app-content">
        <div class="btn-row">
            <button class="abtn primary" onclick="OM('income')">+ Income</button>
            <button class="abtn primary" style="background:#3b82f6" onclick="OM('expense')">+ Expense</button>
            <button class="abtn outline" onclick="OM('transfer')">⇄ Transfer</button>
            <button class="abtn outline" style="margin-left:auto" onclick="logout()">Logout</button>
        </div>

        <div class="metrics-grid" id="metrics"></div>

        <div class="data-table">
            <div class="row header">
                <span>Date</span><span>Description</span><span class="hide-mobile">Account</span><span class="hide-mobile">Category</span><span>Amount</span><span>Actions</span>
            </div>
            <div id="tx-list"></div>
        </div>
    </main>
</div>

<div class="modal-ov" id="modal">
    <div class="modal">
        <h3 id="m-title" style="margin-bottom:20px">Add Transaction</h3>
        <input type="hidden" id="m-id">
        <div id="m-body"></div>
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px">
            <button class="abtn outline" onclick="CM()">Cancel</button>
            <button class="abtn primary" onclick="saveEntry()">Save Entry</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN_EMAIL = "your-email@gmail.com"; // Your email
let currentUser = null;
let txs = [];
let currentType = 'income';

const BANKS = ['MCB','Meezan','Faysal','Easypaisa','Nayapay','Sadapay','Cash'];
const BOPT = BANKS.map(b => `<option value="${b}">${b}</option>`).join('');

// --- AUTH LOGIC ---
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('user-header').innerHTML = `
            <span>${user.email}</span>
            <img src="${user.photoURL || 'https://via.placeholder.com/32'}" alt="profile">
        `;
        loadData();
    } else {
        document.getElementById('splash').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
});

window.googleLogin = () => signInWithPopup(auth, provider);
window.emailLogin = async () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('pw').value;
    try { 
        await signInWithEmailAndPassword(auth, e, p); 
    } catch { 
        await createUserWithEmailAndPassword(auth, e, p); 
    }
};
window.logout = () => signOut(auth);

// --- DATA LOGIC ---
function loadData() {
    const isAdmin = currentUser.email === ADMIN_EMAIL;
    // Requirement 2: Admin sees everyone, users see their own
    const q = isAdmin 
        ? query(collection(db, 'transactions'), orderBy('date', 'desc'))
        : query(collection(db, 'transactions'), where('uid', '==', currentUser.uid), orderBy('date', 'desc'));

    onSnapshot(q, (snap) => {
        txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
    });
}

const MODAL_DEFS = {
    income: `
        <div class="fg"><label>Date</label><input type="date" id="m-date"></div>
        <div class="fg"><label>Account</label><select id="m-bank">${BOPT}</select></div>
        <div class="fg"><label>Description</label><input type="text" id="m-desc"></div>
        <div class="fg"><label>Amount</label><input type="number" id="m-amt"></div>
    `,
    transfer: `
        <div class="fg"><label>Date</label><input type="date" id="m-date"></div>
        <div class="fg"><label>From Bank</label><select id="m-bank-from">${BOPT}</select></div>
        <div class="fg"><label>To Bank</label><select id="m-bank-to">${BOPT}</select></div>
        <div class="fg"><label>Description</label><input type="text" id="m-desc"></div>
        <div class="fg"><label>Amount</label><input type="number" id="m-amt"></div>
    `
};

window.OM = (type, id = null) => {
    currentType = type;
    document.getElementById('m-title').innerText = id ? 'Edit Transaction' : 'Add ' + type;
    document.getElementById('m-body').innerHTML = (type === 'transfer') ? MODAL_DEFS.transfer : MODAL_DEFS.income;
    document.getElementById('m-id').value = id || '';
    
    if (id) {
        const t = txs.find(x => x.id === id);
        document.getElementById('m-date').value = t.date;
        document.getElementById('m-desc').value = t.desc;
        document.getElementById('m-amt').value = t.amount;
    }
    document.getElementById('modal').style.display = 'flex';
};

window.CM = () => document.getElementById('modal').style.display = 'none';

window.saveEntry = async () => {
    const id = document.getElementById('m-id').value;
    const data = {
        uid: currentUser.uid,
        userEmail: currentUser.email,
        date: document.getElementById('m-date').value,
        desc: document.getElementById('m-desc').value,
        amount: parseFloat(document.getElementById('m-amt').value),
        type: currentType
    };

    if (currentType === 'transfer') {
        data.fromBank = document.getElementById('m-bank-from').value;
        data.toBank = document.getElementById('m-bank-to').value;
    } else {
        data.account = document.getElementById('m-bank').value;
    }

    if (id) await updateDoc(doc(db, 'transactions', id), data);
    else await addDoc(collection(db, 'transactions'), data);
    CM();
};

window.deleteTx = async (id) => {
    if (confirm("Delete this transaction?")) await deleteDoc(doc(db, 'transactions', id));
};

function render() {
    const metrics = { inc: 0, exp: 0, balance: 0 };
    const bankBals = {}; BANKS.forEach(b => bankBals[b] = 0);

    const list = txs.map(t => {
        // Requirement 5: Transfer record logic
        if (t.type === 'transfer') {
            bankBals[t.fromBank] -= t.amount;
            bankBals[t.toBank] += t.amount;
        } else {
            const isInc = t.type === 'income';
            metrics[isInc ? 'inc' : 'exp'] += t.amount;
            bankBals[t.account] += (isInc ? 1 : -1) * t.amount;
        }

        return `
            <div class="row">
                <span>${t.date.slice(5)}</span>
                <span style="font-weight:600">${t.desc} ${currentUser.email === ADMIN_EMAIL ? `<br><small style="color:var(--primary)">${t.userEmail}</small>` : ''}</span>
                <span class="hide-mobile">${t.type === 'transfer' ? t.fromBank+'→'+t.toBank : t.account}</span>
                <span class="hide-mobile">${t.type}</span>
                <span style="color: ${t.type === 'income' ? 'var(--green)' : 'var(--red)'}">${t.amount.toLocaleString()}</span>
                <div class="action-icons">
                    <button class="icon-btn" onclick="OM('${t.type}', '${t.id}')">✏️</button>
                    <button class="icon-btn" onclick="deleteTx('${t.id}')">🗑️</button>
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('tx-list').innerHTML = list;
    document.getElementById('metrics').innerHTML = `
        <div class="metric-card"><div class="label">Total Income</div><div class="val" style="color:var(--green)">PKR ${metrics.inc.toLocaleString()}</div></div>
        <div class="metric-card"><div class="label">Total Expenses</div><div class="val" style="color:var(--red)">PKR ${metrics.exp.toLocaleString()}</div></div>
        <div class="metric-card"><div class="label">Wallet Balance</div><div class="val">PKR ${(metrics.inc - metrics.exp).toLocaleString()}</div></div>
    `;
}
</script>
</body>
</html>
