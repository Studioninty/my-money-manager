<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Manager | Simple Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a; --card: #161b2b; --primary: #ff5733; --text: #e2e8f0; --border: #1e2535;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Simple Auth UI */
        .auth-container { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .auth-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .auth-input { width: 100%; padding: 12px; background: #0f1117; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }
        .auth-input:focus { border-color: var(--primary); }
        
        .abtn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .primary { background: var(--primary); color: #fff; margin-top: 10px; }
        
        /* Dashboard placeholder - using your previous structure */
        #app { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logout-btn { background: transparent; color: #94a3b8; border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <h2 style="margin-bottom: 10px;">Money<span>Manager</span></h2>
        <p style="font-size: 14px; color: #94a3b8; margin-bottom: 25px;">Enter details to Login or Sign Up</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="auth-email" class="auth-input" placeholder="name@example.com">
        </div>
        <div class="input-group" style="margin-bottom: 20px;">
            <label>Password</label>
            <input type="password" id="auth-pw" class="auth-input" placeholder="••••••••">
        </div>
        
        <button class="abtn primary" id="btn-submit">Sign In / Register</button>
        <div id="auth-msg" style="margin-top: 15px; font-size: 12px; color: #ef4444;"></div>
    </div>
</div>

<div id="app">
    <div class="header">
        <h2 id="welcome-text">Dashboard</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div id="admin-notice" style="display:none; color: #ff5733; margin-bottom: 20px; font-weight: bold;">
        ADMINISTRATOR ACCESS GRANTED
    </div>

    <div id="metrics-view" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
    
    <div id="tx-list" style="margin-top: 30px; background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px;">
        Loading transactions...
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDRErh8H98za0QzYBziRMVfm5dMfAa9MDA",
        authDomain: "my-money-manager-1dacb.firebaseapp.com",
        projectId: "my-money-manager-1dacb",
        storageBucket: "my-money-manager-1dacb.firebasestorage.app",
        messagingSenderId: "472698368140",
        appId: "1:472698368140:web:8efd3e38778610099d4ba9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const ADMIN_EMAIL = "saqib77000@gmail.com";

    // 1. Auth Listener (Direct & Simple)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('welcome-text').innerText = "Welcome, " + user.email.split('@')[0];
            
            const isAdmin = user.email === ADMIN_EMAIL;
            if(isAdmin) document.getElementById('admin-notice').style.display = 'block';
            
            loadData(isAdmin, user.uid);
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // 2. Combined Login/Signup Function
    document.getElementById('btn-submit').onclick = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pw').value;
        const msg = document.getElementById('auth-msg');
        
        if(!email || !password) {
            msg.innerText = "Please fill all fields.";
            return;
        }

        try {
            msg.style.color = "#ff5733";
            msg.innerText = "Authenticating...";
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            // If user doesn't exist, try creating account
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                } catch (signUpError) {
                    msg.innerText = "Error: " + signUpError.message;
                }
            } else {
                msg.innerText = error.message;
            }
        }
    };

    window.logout = () => signOut(auth);

    // 3. Load Data with SaaS Isolation
    function loadData(isAdmin, uid) {
        const q = isAdmin 
            ? query(collection(db, "transactions"), orderBy("date", "desc"))
            : query(collection(db, "transactions"), where("uid", "==", uid), orderBy("date", "desc"));

        onSnapshot(q, (snap) => {
            const txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable(txs, isAdmin);
        });
    }

    function renderTable(txs, isAdmin) {
        const list = document.getElementById('tx-list');
        if(txs.length === 0) {
            list.innerHTML = "No transactions found. Add some to get started.";
            return;
        }

        list.innerHTML = txs.map(t => `
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e2535; font-size: 13px;">
                <span>${t.date}</span>
                <div style="flex: 1; margin: 0 15px;">
                    <strong>${t.desc}</strong>
                    ${isAdmin ? `<br><small style="color: #ff5733">${t.userEmail || 'User'}</small>` : ''}
                </div>
                <span style="color: ${t.type === 'income' ? '#10b981' : '#ef4444'}">PKR ${t.amount.toLocaleString()}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
