<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Money Manager | Multi-User SaaS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    
    <style>
        :root {
            /* Design Reference Colors */
            --bg: #131417;
            --card: rgba(30, 32, 38, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #FF5733; /* Accent from image */
            --green: #1D9E75;
            --red: #D85A30;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Layout */
        .app { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        
        /* Auth Screen */
        #auth-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; background: var(--bg);
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        /* Header & Nav */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
        }
        .logo { font-size: 24px; font-weight: 700; }
        .logo span { color: var(--primary); }

        /* Responsive Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .val { font-size: 28px; font-weight: 700; margin-top: 5px; }
        .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Buttons */
        .abtn {
            padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: 600; transition: 0.3s; font-size: 13px;
        }
        .abtn.primary { background: var(--primary); color: white; }
        .abtn.google { background: #fff; color: #000; }

        /* Transaction List with Edit Access */
        .row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 100px 60px;
            gap: 10px; padding: 15px; border-bottom: 1px solid var(--border);
            align-items: center; transition: background 0.2s;
        }
        .row:hover { background: rgba(255,255,255,0.02); }
        .edit-icon { color: var(--primary); cursor: pointer; font-size: 18px; }

        /* Responsive Mobile Tweak */
        @media (max-width: 600px) {
            .row { grid-template-columns: 1fr 100px 40px; }
            .hide-mobile { display: none; }
            .topbar { flex-direction: column; text-align: center; }
        }

        /* Admin Badge */
        .admin-panel {
            background: rgba(255, 87, 51, 0.1);
            border: 1px solid var(--primary);
            padding: 1rem; border-radius: 12px; margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="glass-card" style="width: 350px; text-align: center;">
        <h2 style="margin-bottom: 1.5rem;">Welcome</h2>
        <p style="color: var(--text-dim); margin-bottom: 2rem;">Sign in to manage your money</p>
        <button class="abtn google" id="btn-login" style="width: 100%;">Continue with Google</button>
    </div>
</div>

<div id="main-app" class="app" style="display: none;">
    <div class="topbar">
        <div class="logo">Money<span>Horizon</span></div>
        <div id="admin-indicator"></div>
        <div class="nav" style="display: flex; gap: 10px;">
            <button class="abtn primary" onclick="OM('income')">+ Income</button>
            <button class="abtn primary" style="background:#3b82f6" onclick="OM('expense')">+ Expense</button>
            <button class="abtn primary" style="background:#6b7280" onclick="OM('transfer')">⇄ Transfer</button>
            <button class="abtn" onclick="logout()" style="background: transparent; color: var(--text-dim)">Logout</button>
        </div>
    </div>

    <div id="admin-view" style="display: none;" class="admin-panel">
        <h4 style="color: var(--primary); margin-bottom: 10px;">ADMIN PANEL: User Monitoring</h4>
        <div id="user-list-summary" style="font-size: 12px; display: flex; gap: 20px;"></div>
    </div>

    <div class="metrics-grid" id="main-metrics">
        </div>

    <div class="glass-card">
        <div class="label" style="margin-bottom: 15px;">Recent Transactions</div>
        <div id="tx-list"></div>
    </div>
</div>

<div class="modal-ov" id="modal">
    <div class="modal glass-card" style="width: 400px; background: #1e2026;">
        <div id="m-title" style="font-weight: 700; margin-bottom: 1rem;">Add Record</div>
        <input type="hidden" id="m-id"> <div id="m-body"></div>
        <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
            <button class="abtn" onclick="CM()" style="flex: 1; background: #333;">Cancel</button>
            <button class="abtn primary" onclick="saveEntry()" style="flex: 1;">Save Changes</button>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = { 
  apiKey: "AIzaSyDRErh8H98za0QzYBziRMVfm5dMfAa9MDA",
  authDomain: "my-money-manager-1dacb.firebaseapp.com",
  projectId: "my-money-manager-1dacb",
  storageBucket: "my-money-manager-1dacb.firebasestorage.app",
  messagingSenderId: "472698368140",
  appId: "1:472698368140:web:8efd3e38778610099d4ba9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// IMPORTANT: This "catches" the login after you come back from Google
getRedirectResult(auth).catch((error) => {
    console.error("Login error:", error);
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('splash').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
  } else {
    document.getElementById('splash').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.googleLogin = () => signInWithRedirect(auth, provider);
window.logout = () => signOut(auth);

// Set the button click in JS to ensure it's bound correctly
document.getElementById('btn-login').onclick = window.googleLogin;
    async function initApp() {
        const isAdmin = user.email === ADMIN_EMAIL;
        
        if (isAdmin) {
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('admin-indicator').innerHTML = `<span style="font-size: 10px; background: var(--primary); padding: 4px 8px; border-radius: 20px;">ADMIN MODE</span>`;
        }

        // 2. SaaS Logic: User sees their data, Admin sees EVERYTHING
        const q = isAdmin 
            ? query(collection(db, "transactions"), orderBy("date", "desc"))
            : query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("date", "desc"));

        onSnapshot(q, (snapshot) => {
            allTransactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderAll();
        });
    }

    // 1. Edit Access Function
    window.editTx = (id) => {
        const t = allTransactions.find(x => x.id === id);
        OM(t.type, id);
    }

    function renderAll() {
        const list = document.getElementById('tx-list');
        const metricsEl = document.getElementById('main-metrics');
        
        let income = 0, expense = 0;
        
        list.innerHTML = allTransactions.map(t => {
            if (t.type === 'income') income += t.amount;
            if (t.type === 'expense') expense += t.amount;
            
            // 2. Admin Activity Visibility
            const userTag = user.email === ADMIN_EMAIL ? `<div style="font-size: 9px; color: var(--primary)">User: ${t.userName || 'Unknown'}</div>` : '';

            return `
                <div class="row">
                    <span class="hide-mobile">${t.date.slice(5)}</span>
                    <div>
                        <div style="font-weight: 600;">${t.desc}</div>
                        ${userTag}
                    </div>
                    <span class="hide-mobile" style="color: var(--text-dim)">${t.account}</span>
                    <span style="font-weight: 700; color: ${t.type === 'income' ? 'var(--green)' : 'var(--red)'}">
                        ${t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}
                    </span>
                    <span class="edit-icon" onclick="editTx('${t.id}')">✎</span>
                </div>
            `;
        }).join('');

        metricsEl.innerHTML = `
            <div class="glass-card"><div class="label">Total Income</div><div class="val" style="color: var(--green)">PKR ${income.toLocaleString()}</div></div>
            <div class="glass-card"><div class="label">Total Expenses</div><div class="val" style="color: var(--red)">PKR ${expense.toLocaleString()}</div></div>
            <div class="glass-card"><div class="label">Net Balance</div><div class="val">PKR ${(income-expense).toLocaleString()}</div></div>
        `;
    }

    // Modal & Form Handling
    const BANKS = ['MCB','Meezan','Faysal','Easypaisa','Nayapay','Cash'];
    const BOPT = BANKS.map(b => `<option value="${b}">${b}</option>`).join('');

    window.OM = (type, editId = null) => {
        const modal = document.getElementById('modal');
        const body = document.getElementById('m-body');
        document.getElementById('m-id').value = editId || '';
        
        let html = `
            <div class="fg"><label>Date</label><input type="date" id="m-date" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff"></div>
            <div class="fg"><label>Description</label><input type="text" id="m-desc" placeholder="Salary, Grocery, etc." style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff"></div>
            <div class="fg"><label>Amount</label><input type="number" id="m-amt" placeholder="0" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff"></div>
        `;

        if (type === 'transfer') {
            html += `
                <div class="fg"><label>From Bank</label><select id="m-bank-from" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff">${BOPT}</select></div>
                <div class="fg"><label>To Bank</label><select id="m-bank-to" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff">${BOPT}</select></div>
            `;
        } else {
            html += `<div class="fg"><label>Account</label><select id="m-bank" style="width:100%; padding:8px; background:#111; border:1px solid #333; color:#fff">${BOPT}</select></div>`;
        }

        body.innerHTML = html;
        modal.style.display = 'flex';

        if (editId) {
            const t = allTransactions.find(x => x.id === editId);
            document.getElementById('m-date').value = t.date;
            document.getElementById('m-desc').value = t.desc;
            document.getElementById('m-amt').value = t.amount;
        }
    };

    window.saveEntry = async () => {
        const id = document.getElementById('m-id').value;
        const data =
