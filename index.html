<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager Pro — SaaS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --card: #161b27;
  --text: #e2e8f0;
  --primary: #ff5733; 
  --transfer: #0ea5e9;
  --border: #1e2535;
  --green: #1D9E75;
  --red: #ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter', sans-serif;background:var(--bg);color:var(--text);min-height:100vh; line-height: 1.6}
.app{max-width:1200px;margin:0 auto;padding:1rem}

/* UI Components */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding:1rem;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid var(--border);flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:700}.logo span{color:var(--primary)}
.auth-user{display:flex;align-items:center;gap:12px;font-size:12px;}
.auth-user img{width:32px;height:32px;border-radius:50%;border:2px solid var(--primary)}

.nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px; margin-bottom: 1rem;}
.nb{padding:8px 16px;font-size:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:#94a3b8;cursor:pointer;white-space:nowrap;transition: 0.2s;}
.nb.active{background:var(--primary);color:#fff;border-color:var(--primary)}

.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:1.5rem}
.m{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px; position: relative; overflow: hidden;}
.ml{font-size:10px;color:#64748b;text-transform:uppercase;margin-bottom:6px; font-weight: 700; letter-spacing: 0.5px;}
.mv{font-size:20px;font-weight:700}

/* Transaction List */
.row{display:grid;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:center}
.tx-grid{grid-template-columns:60px 1fr 100px 90px 90px 80px}
.rh{font-weight:700;color:#475569;text-transform:uppercase;font-size:10px;}

.edit-btn{background:#1e2535;color:#3b82f6;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px; font-weight: 600;}
.edit-btn:hover{background: #252d3d;}

/* Modals */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center; backdrop-filter: blur(5px);}
.modal-ov.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;width:420px;max-width:95vw}
.fg{margin-bottom:15px}
.fg label{font-size:11px;color:#94a3b8;display:block;margin-bottom:6px; font-weight: 600;}
.fg input, .fg select{width:100%;padding:12px;background:#0f1117;border:1px solid var(--border);color:#fff;border-radius:10px;outline:none;}

/* Action Buttons */
.abtn{padding:10px 20px;border-radius:10px;cursor:pointer;border:none;font-weight:700;font-size:13px; transition: 0.2s;}
.abtn:active{transform: translateY(2px);}
.green{background:var(--green);color:#fff}
.blue{background:#3b82f6;color:white}
.transfer-btn{background:var(--transfer);color:#fff}

@media(max-width:768px){
    .tx-grid{grid-template-columns:55px 1fr 80px 70px; gap: 5px;}
    .hide-mobile{display:none}
}
</style>
</head>
<body>

<div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px; background: #0f1117;">
    <div class="logo" style="font-size: 32px;">My <span>Money</span> Manager</div>
    <div id="auth-action"><div style="color:#64748b">Syncing with database...</div></div>
</div>

<div class="app" id="main-app" style="display:none">
  <div class="topbar">
    <div class="logo">My <span>Money</span> Manager</div>
    <div id="user-info" class="auth-user"></div>
  </div>

  <div class="nav">
    <button class="nb active" onclick="ST('dashboard',this)">Dashboard</button>
    <button class="nb" onclick="ST('alltx',this)">Transactions History</button>
    <button class="nb" style="color:var(--red)" onclick="logout()">Logout</button>
  </div>

  <div id="tab-dashboard" class="tab active">
    <div style="display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap">
        <button class="abtn green" onclick="OM('income')">+ Income</button>
        <button class="abtn blue" onclick="OM('expense')">+ Expense</button>
        <button class="abtn transfer-btn" onclick="OM('transfer')">⇄ Transfer</button>
    </div>

    <div id="metrics" class="mg"></div>
    
    <div class="m">
        <div class="ml">Latest Activity</div>
        <div class="row rh tx-grid"><span>Date</span><span>Description</span><span class="hide-mobile">Category</span><span>Account</span><span>Amount</span><span>Action</span></div>
        <div id="recent-list"></div>
    </div>
  </div>

  <div id="tab-alltx" class="tab" style="display:none">
    <div class="m">
        <div class="ml">Complete Financial Log</div>
        <div class="row rh tx-grid"><span>Date</span><span>Description</span><span class="hide-mobile">Category</span><span>Account</span><span>Amount</span><span>Action</span></div>
        <div id="history-list"></div>
    </div>
  </div>
</div>

<div class="modal-ov" id="modal">
  <div class="modal">
    <h3 id="m-title" style="margin-bottom:20px; font-weight: 700;">Add Entry</h3>
    <input type="hidden" id="m-edit-id">
    <div id="m-body"></div>
    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:25px">
        <button onclick="CM()" style="background:transparent;color:#94a3b8;border:none;cursor:pointer; font-weight: 600;">Cancel</button>
        <button class="abtn green" id="save-btn" onclick="saveEntry()">Confirm & Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRErh8H98za0QzYBziRMVfm5dMfAa9MDA",
  authDomain: "my-money-manager-1dacb.firebaseapp.com",
  projectId: "my-money-manager-1dacb",
  storageBucket: "my-money-manager-1dacb.firebasestorage.app",
  messagingSenderId: "472698368140",
  appId: "1:472698368140:web:8efd3e38778610099d4ba9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// IMPORTANT: Set your admin email here
const ADMIN_EMAIL = "saqib77000@gmail.com"; 

let currentUser = null;
let txs = [];
let currentModal = '';

const BANKS = ['MCB','Meezan','Faysal','Easypaisa','Nayapay','Sadapay','Cash'];
const BOPT = BANKS.map(b => `<option value="${b}">${b}</option>`).join('');

getRedirectResult(auth).catch(e => console.error("Redirect Failed:", e));

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    const isAdmin = user.email === ADMIN_EMAIL;
    document.getElementById('user-info').innerHTML = `
        <img src="${user.photoURL}"> 
        <div style="display:flex; flex-direction:column">
            <span style="font-weight:700; color:#fff">${user.displayName}</span>
            <span style="font-size:10px; color:${isAdmin ? 'var(--primary)' : '#94a3b8'}">${isAdmin ? 'SYSTEM ADMINISTRATOR' : 'Member'}</span>
        </div>`;
    loadData(isAdmin);
  } else {
    document.getElementById('loading-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('auth-action').innerHTML = `<button class="abtn green" onclick="window.login()">Login with Google</button>`;
  }
});

window.login = () => signInWithRedirect(auth, provider);
window.logout = () => signOut(auth);

function loadData(isAdmin) {
  const q = isAdmin 
    ? query(collection(db, 'transactions'), orderBy('date', 'desc'))
    : query(collection(db, 'transactions'), where('uid', '==', currentUser.uid), orderBy('date', 'desc'));

  onSnapshot(q, (snap) => {
    txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });
}

const MODAL_DEFS = {
  income: { title: 'Add Income', fields: `<div class="fg"><label>Date</label><input type="date" id="m-date"></div><div class="fg"><label>Account</label><select id="m-bank">${BOPT}</select></div><div class="fg"><label>Category</label><input type="text" id="m-cat" value="Salary"></div><div class="fg"><label>Description</label><input type="text" id="m-desc"></div><div class="fg"><label>Amount (PKR)</label><input type="number" id="m-amt"></div>` },
  expense: { title: 'Add Expense', fields: `<div class="fg"><label>Date</label><input type="date" id="m-date"></div><div class="fg"><label>Paid From</label><select id="m-bank">${BOPT}</select></div><div class="fg"><label>Category</label><input type="text" id="m-cat" value="Personal"></div><div class="fg"><label>Description</label><input type="text" id="m-desc"></div><div class="fg"><label>Amount (PKR)</label><input type="number" id="m-amt"></div>` },
  transfer: { title: 'Bank Transfer', fields: `<div class="fg"><label>Date</label><input type="date" id="m-date"></div><div class="fg"><label>From Bank</label><select id="m-bank-from">${BOPT}</select></div><div class="fg"><label>To Bank</label><select id="m-bank-to">${BOPT}</select></div><div class="fg"><label>Description</label><input type="text" id="m-desc" value="Internal Transfer"></div><div class="fg"><label>Amount (PKR)</label><input type="number" id="m-amt"></div>` }
};

window.OM = (type) => {
    currentModal = type;
    document.getElementById('m-title').innerText = MODAL_DEFS[type].title;
    document.getElementById('m-body').innerHTML = MODAL_DEFS[type].fields;
    document.getElementById('m-edit-id').value = '';
    document.getElementById('m-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('modal').classList.add('open');
};

window.CM = () => document.getElementById('modal').classList.remove('open');

window.saveEntry = async () => {
    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.innerText = "Processing...";
    const editId = document.getElementById('m-edit-id').value;
    const data = {
        uid: currentUser.uid,
        userName: currentUser.displayName,
        userEmail: currentUser.email,
        date: document.getElementById('m-date').value,
        desc: document.getElementById('m-desc').value,
        amount: parseFloat(document.getElementById('m-amt').value)
    };

    if(currentModal === 'transfer') {
        data.type = 'transfer';
        data.fromBank = document.getElementById('m-bank-from').value;
        data.toBank = document.getElementById('m-bank-to').value;
        data.cat = 'Transfer';
    } else {
        data.type = currentModal === 'income' ? 'in' : 'out';
        data.account = document.getElementById('m-bank').value;
        data.cat = document.getElementById('m-cat').value;
    }

    try {
        editId ? await updateDoc(doc(db, 'transactions', editId), data) : await addDoc(collection(db, 'transactions'), data);
        CM();
    } catch(e) { alert("Save Error: Check Console."); }
    btn.disabled = false; btn.innerText = "Confirm & Save";
};

window.editTx = (id) => {
    const t = txs.find(x => x.id === id);
    OM(t.type === 'transfer' ? 'transfer' : (t.type === 'in' ? 'income' : 'expense'));
    setTimeout(() => {
        document.getElementById('m-edit-id').value = t.id;
        document.getElementById('m-date').value = t.date;
        document.getElementById('m-desc').value = t.desc;
        document.getElementById('m-amt').value = t.amount;
        if(t.type === 'transfer') {
            document.getElementById('m-bank-from').value = t.fromBank;
            document.getElementById('m-bank-to').value = t.toBank;
        } else {
            document.getElementById('m-bank').value = t.account;
            document.getElementById('m-cat').value = t.cat;
        }
    }, 50);
};

window.deleteTx = async (id) => {
    if(confirm("Delete this transaction forever?")) await deleteDoc(doc(db, 'transactions', id));
};

function renderAll() {
    const balances = { MCB:0, Meezan:0, Faysal:0, Easypaisa:0, Nayapay:0, Sadapay:0, Cash:0 };
    let inc = 0, exp = 0;

    txs.forEach(t => {
        if(t.type === 'transfer') {
            balances[t.fromBank] -= t.amount;
            balances[t.toBank] += t.amount;
        } else {
            if(balances[t.account] !== undefined) {
              balances[t.account] += (t.type === 'in' ? 1 : -1) * t.amount;
              if(t.type === 'in') inc += t.amount; else exp += t.amount;
            }
        }
    });

    document.getElementById('metrics').innerHTML = `
        <div class="m"><div class="ml">Net Income</div><div class="mv" style="color:var(--green)">PKR ${inc.toLocaleString()}</div></div>
        <div class="m"><div class="ml">Total Spent</div><div class="mv" style="color:var(--red)">PKR ${exp.toLocaleString()}</div></div>
        ${Object.keys(balances).map(b => `<div class="m"><div class="ml">${b}</div><div class="mv">${balances[b].toLocaleString()}</div></div>`).join('')}
    `;

    const isAdmin = currentUser.email === ADMIN_EMAIL;
    const generateRow = t => `
        <div class="row tx-grid">
            <span>${t.date.split('-').slice(1).join('/')}</span>
            <span style="font-size:11px; font-weight:500">${t.desc} ${isAdmin ? `<br><small style="color:var(--primary)">${t.userName}</small>` : ''}</span>
            <span class="hide-mobile">${t.cat}</span>
            <span style="color:#94a3b8">${t.type === 'transfer' ? t.fromBank+'→'+t.toBank : t.account}</span>
            <span style="font-weight:700; color:${t.type==='in'?'var(--green)':'var(--red)'}">${t.amount.toLocaleString()}</span>
            <div style="display:flex; gap:6px">
                <button class="edit-btn" onclick="editTx('${t.id}')">Edit</button>
                <button class="edit-btn" style="color:var(--red)" onclick="deleteTx('${t.id}')">✕</button>
            </div>
        </div>`;
    
    document.getElementById('recent-list').innerHTML = txs.slice(0, 15).map(generateRow).join('');
    document.getElementById('history-list').innerHTML = txs.map(generateRow).join('');
}

window.ST = (t, b) => {
    document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.nb').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+t).style.display = 'block';
    b.classList.add('active');
};
</script>
</body>
</html>
