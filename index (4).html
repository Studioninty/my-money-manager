<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Manager Pro | Personal Cabinet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f111a; 
  --card: rgba(30, 35, 50, 0.7); 
  --primary: #ff5733; /* Reference Orange */
  --green: #10b981; 
  --red: #ef4444; 
  --text: #e2e8f0; 
  --border: rgba(255, 255, 255, 0.08);
  --glass: blur(12px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Splash Screen */
.splash { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.auth-box { background: var(--card); padding: 3rem; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; backdrop-filter: var(--glass); }
.auth-box h2 { font-size: 24px; margin-bottom: 20px; font-weight: 700; }
.auth-box h2 span { color: var(--primary); }
.auth-input { width: 100%; padding: 12px; margin-bottom: 12px; background: #0b0d14; border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }

/* Dashboard Layout */
.app { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: none; }
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding: 1rem; background: var(--card); border-radius: 20px; border: 1px solid var(--border); backdrop-filter: var(--glass); }
.logo { font-size: 22px; font-weight: 700; } .logo span { color: var(--primary); }

/* Navigation Tabs */
.nav { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 1.5rem; padding-bottom: 5px; }
.nb { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: #94a3b8; cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; transition: 0.3s; }
.nb.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Metrics Grid (As per reference) */
.mg { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
.m { background: var(--card); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: var(--glass); position: relative; }
.ml { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
.mv { font-size: 32px; font-weight: 700; }

/* Data Table */
.data-card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 1.5rem; backdrop-filter: var(--glass); }
.row { display: grid; grid-template-columns: 80px 1fr 120px 100px 120px 80px; padding: 15px 10px; border-bottom: 1px solid var(--border); align-items: center; font-size: 14px; }
.rh { font-weight: 700; color: #64748b; text-transform: uppercase; font-size: 11px; }
.row:last-child { border-bottom: none; }

/* Buttons */
.abtn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
.green { background: var(--green); color: #fff; }
.blue { background: #3b82f6; color: #fff; }
.orange { background: var(--primary); color: #fff; }
.logout-btn { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid var(--border); }

/* Edit Buttons */
.icon-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 6px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.icon-btn:hover { background: var(--primary); }

/* Modal */
.modal-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
.modal-ov.open { display: flex; }
.modal { background: #161b2b; padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 480px; }
.fg { margin-bottom: 1.2rem; }
.fg label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
.fg input, .fg select { width: 100%; padding: 12px; background: #0b0d14; border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none; }

@media (max-width: 768px) {
  .row { grid-template-columns: 70px 1fr 100px 70px; }
  .hide-mobile { display: none; }
  .topbar { flex-direction: column; text-align: center; gap: 15px; }
}
</style>
</head>
<body>

<div id="splash" class="splash">
  <div class="auth-box">
    <h2>Personal <span>Cabinet</span></h2>
    <p style="color:#64748b; margin-bottom: 25px;">saqib77000 Admin Dashboard</p>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-pw" class="auth-input" placeholder="Password">
    <button class="abtn orange" style="width: 100%" onclick="emailLogin()">Login / Register</button>
    <div id="auth-msg" style="margin-top: 15px; color: var(--red); font-size: 12px;"></div>
  </div>
</div>

<div class="app" id="main-app">
  <header class="topbar">
    <div class="logo">Money<span>Cabinet</span></div>
    <div id="user-info" style="font-size: 13px; font-weight: 500;"></div>
    <button class="abtn logout-btn" onclick="logout()">Sign Out</button>
  </header>

  <div class="nav">
    <button class="nb active" onclick="ST('dashboard',this)">Cabinet Overview</button>
    <button class="nb" onclick="ST('history',this)">Transaction History</button>
  </div>

  <div id="tab-dashboard" class="tab active">
    <div style="display:flex; gap:12px; margin-bottom:25px; flex-wrap:wrap">
      <button class="abtn green" onclick="OM('income')">+ Income</button>
      <button class="abtn blue" onclick="OM('expense')">+ Expense</button>
      <button class="abtn orange" onclick="OM('transfer')">⇄ Transfer Funds</button>
    </div>

    <div id="metrics" class="mg"></div>

    <div class="data-card">
      <div class="ml" style="margin-bottom: 15px">Recent Activity</div>
      <div class="row rh"><span>Date</span><span>Description</span><span class="hide-mobile">Account</span><span class="hide-mobile">Type</span><span>Amount</span><span>Action</span></div>
      <div id="recent-list"></div>
    </div>
  </div>

  <div id="tab-history" class="tab">
    <div class="data-card">
        <div class="ml">Full Ledger</div>
        <div id="full-list"></div>
    </div>
  </div>
</div>

<div class="modal-ov" id="modal">
  <div class="modal">
    <h3 id="m-title" style="margin-bottom: 20px">New Entry</h3>
    <input type="hidden" id="m-edit-id">
    <div id="m-body"></div>
    <div style="display: flex; gap: 10px; margin-top: 25px">
      <button onclick="CM()" style="flex: 1; background: transparent; color: #94a3b8; border: none; cursor: pointer">Cancel</button>
      <button class="abtn orange" onclick="saveEntry()" style="flex: 2">Confirm Entry</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, query, where, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDRErh8H98za0QzYBziRMVfm5dMfAa9MDA",
  authDomain: "my-money-manager-1dacb.firebaseapp.com",
  projectId: "my-money-manager-1dacb",
  storageBucket: "my-money-manager-1dacb.firebasestorage.app",
  messagingSenderId: "472698368140",
  appId: "1:472698368140:web:8efd3e38778610099d4ba9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "saqib77000@gmail.com";
const BANKS = ['MCB','Meezan','Faysal','Easypaisa','Nayapay','Sadapay','Cash'];
const BOPT = BANKS.map(b => `<option value="${b}">${b}</option>`).join('');

let currentUser = null, txs = [], currentType = '';

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('splash').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('user-info').innerHTML = user.email + (user.email === ADMIN_EMAIL ? " <b style='color:var(--primary)'>(ADMIN)</b>" : "");
    loadData(user.email === ADMIN_EMAIL);
  } else {
    document.getElementById('splash').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
  }
});

window.emailLogin = async () => {
  const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pw').value, msg = document.getElementById('auth-msg');
  if(!e || !p) return msg.innerText = "Fill all fields";
  try { await signInWithEmailAndPassword(auth, e, p); } 
  catch (err) {
    try { await createUserWithEmailAndPassword(auth, e, p); } catch (e2) { msg.innerText = e2.message; }
  }
};
window.logout = () => signOut(auth);

function loadData(isAdmin) {
  // Requirement: Admin sees all, Users see only themselves
  const q = isAdmin 
    ? query(collection(db, "transactions"), orderBy("date", "desc"))
    : query(collection(db, "transactions"), where("uid", "==", currentUser.uid), orderBy("date", "desc"));

  onSnapshot(q, (snap) => {
    txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  });
}

const TEMPLATES = {
  std: `<div class="fg"><label>Date</label><input type="date" id="m-date"></div><div class="fg"><label>Bank Account</label><select id="m-bank">${BOPT}</select></div><div class="fg"><label>Category</label><input type="text" id="m-cat" placeholder="Salary, Food, Rent..."></div><div class="fg"><label>Description</label><input type="text" id="m-desc"></div><div class="fg"><label>Amount</label><input type="number" id="m-amt"></div>`,
  transfer: `<div class="fg"><label>Date</label><input type="date" id="m-date"></div><div class="fg"><label>From Bank</label><select id="m-bank-from">${BOPT}</select></div><div class="fg"><label>To Bank</label><select id="m-bank-to">${BOPT}</select></div><div class="fg"><label>Description</label><input type="text" id="m-desc" value="Inter-bank Transfer"></div><div class="fg"><label>Amount</label><input type="number" id="m-amt"></div>`
};

window.OM = (type, editId = null) => {
  currentType = type;
  document.getElementById('m-title').innerText = (editId ? 'Edit ' : 'New ') + type.toUpperCase();
  document.getElementById('m-body').innerHTML = type === 'transfer' ? TEMPLATES.transfer : TEMPLATES.std;
  document.getElementById('m-edit-id').value = editId || '';
  if(editId) {
    const t = txs.find(x => x.id === editId);
    document.getElementById('m-date').value = t.date;
    document.getElementById('m-desc').value = t.desc;
    document.getElementById('m-amt').value = t.amount;
    if(type === 'transfer') { document.getElementById('m-bank-from').value = t.fromBank; document.getElementById('m-bank-to').value = t.toBank; }
    else { document.getElementById('m-bank').value = t.account; document.getElementById('m-cat').value = t.category; }
  } else { document.getElementById('m-date').value = new Date().toISOString().split('T')[0]; }
  document.getElementById('modal').classList.add('open');
};

window.CM = () => document.getElementById('modal').classList.remove('open');

window.saveEntry = async () => {
  const eid = document.getElementById('m-edit-id').value;
  const data = {
    uid: currentUser.uid, userEmail: currentUser.email,
    date: document.getElementById('m-date').value, desc: document.getElementById('m-desc').value,
    amount: parseFloat(document.getElementById('m-amt').value),
    type: currentType === 'income' ? 'in' : (currentType === 'expense' ? 'out' : 'transfer')
  };
  if(currentType === 'transfer') { 
    data.fromBank = document.getElementById('m-bank-from').value; 
    data.toBank = document.getElementById('m-bank-to').value; 
    data.category = 'Transfer';
  } else { 
    data.account = document.getElementById('m-bank').value; 
    data.category = document.getElementById('m-cat').value; 
  }
  
  if(eid) await updateDoc(doc(db, "transactions", eid), data);
  else await addDoc(collection(db, "transactions"), data);
  CM();
};

window.deleteTx = async (id) => { if(confirm("Permanently delete?")) await deleteDoc(doc(db, "transactions", id)); };

function render() {
  const bals = {}; BANKS.forEach(b => bals[b] = 0);
  let inc = 0, exp = 0;

  txs.forEach(t => {
    // Transfer logic: Sub from one, add to other
    if(t.type === 'transfer') { 
      bals[t.fromBank] -= t.amount; 
      bals[t.toBank] += t.amount; 
    } else {
      const v = (t.type === 'in' ? 1 : -1) * t.amount;
      bals[t.account] += v;
      if(t.type === 'in') inc += t.amount; else exp += t.amount;
    }
  });

  document.getElementById('metrics').innerHTML = `
    <div class="m"><div class="ml">Total Income</div><div class="mv" style="color:var(--green)">${inc.toLocaleString()}</div></div>
    <div class="m"><div class="ml">Total Expense</div><div class="mv" style="color:var(--red)">${exp.toLocaleString()}</div></div>
    <div class="m"><div class="ml">Net Cabinet Balance</div><div class="mv">${(inc-exp).toLocaleString()}</div></div>
    ${Object.keys(bals).filter(b => bals[b] !== 0).map(b => `
      <div class="m"><div class="ml">${b}</div><div class="mv" style="font-size:18px">PKR ${bals[b].toLocaleString()}</div></div>
    `).join('')}
  `;

  const isAdmin = currentUser.email === ADMIN_EMAIL;
  const listHtml = txs.map(t => `
    <div class="row">
      <span style="color:#64748b">${t.date.slice(5)}</span>
      <span><strong>${t.desc}</strong>${isAdmin ? `<br><small style="color:var(--primary)">${t.userEmail}</small>` : ''}</span>
      <span class="hide-mobile">${t.category}</span>
      <span>${t.type === 'transfer' ? t.fromBank+'→'+t.toBank : t.account}</span>
      <span style="font-weight:700; color:${t.type==='in'?'var(--green)':'var(--red)'}">${t.amount.toLocaleString()}</span>
      <div style="display:flex; gap:6px">
        <button class="icon-btn" onclick="OM('${t.type === 'transfer' ? 'transfer' : (t.type === 'in' ? 'income' : 'expense')}', '${t.id}')">✎</button>
        <button class="icon-btn" style="color:var(--red)" onclick="deleteTx('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');

  document.getElementById('recent-list').innerHTML = listHtml;
  document.getElementById('full-list').innerHTML = listHtml;
}

window.ST = (t, b) => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(x => x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  b.classList.add('active');
};
</script>
</body>
</html>
